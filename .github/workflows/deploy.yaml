name: Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DAGGER_VERSION: 86d1d2f5791bcf3213d56903cfa81a3ba0abe54a

jobs:
  production:
    name: Deploy (production)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create env file
        working-directory: demo
        run: echo 'CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}' > .env

      - name: Deploy
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          workdir: demo
          verb: call
          dagger-flags: --lock pinned --progress plain
          args: >-
            worker deploy
            --account-id ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            --api-token env://CLOUDFLARE_API_TOKEN
          # version: ${{ env.DAGGER_VERSION }}
          commit: ${{ env.DAGGER_VERSION }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  preview:
    name: Deploy (preview)
    runs-on: ubuntu-latest
    # Fork and Dependabot PRs have no access to the Cloudflare secrets.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create env file
        working-directory: demo
        run: echo 'CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}' > .env

      - name: Deploy preview
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          workdir: demo
          verb: call
          dagger-flags: --lock pinned --progress plain
          args: >-
            worker deploy-pull-request
            --pull-request ${{ github.event.pull_request.number }}
            --commit ${{ github.event.pull_request.head.sha }}
            --account-id ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            --api-token env://CLOUDFLARE_API_TOKEN
            --github-token env://GITHUB_TOKEN
            --repository ${{ github.repository }}
          # version: ${{ env.DAGGER_VERSION }}
          commit: ${{ env.DAGGER_VERSION }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
